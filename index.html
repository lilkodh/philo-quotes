<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>philo quotes</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <nav>
    <h1>PHILO QUOTES</h1>
  </nav>
</header>

<main>

  <section class="hero">
    <div id="ww">
      <h1>SEARCH FOR <br>YOUR QUOTE</h1>

      <input type="text" placeholder="Search now...">
      <br>
      <button>FIND</button>
    </div>
  </section>

  <div class="rest6">

    <section id="results">
      <h1>RESULTS</h1>

      <div class="quote">
        <p id="quote-text"></p>
        <p id="quote-author"></p>
      </div>
    </section>

    <section id="favorite">
      <h1>FAVORITE QUOTES</h1>

      <div class="favorat-quote">
        <p id="favorite-text"></p>
      </div>
    </section>

  </div>

</main>

<script src="script.js"></script>
</body>
</html>
